name: Diagnose Early Modern noble catalogue assembly

on:
  push:
    branches:
      - design/earlymodern-noble-court-jewellery-pass-3
    paths:
      - .tmp/earlymodern-noble-pass3/READY
  pull_request:
    branches:
      - master
    paths:
      - .tmp/earlymodern-noble-pass3/READY

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: design/earlymodern-noble-court-jewellery-pass-3
          fetch-depth: 0
          show-progress: false

      - name: Diagnose the transfer payload
        shell: bash
        run: |
          temporary_directory='.tmp/earlymodern-noble-pass3'
          target='/tmp/assembled-reference.md'
          diagnostic='Design Documents/Seeding/_EarlyModern_Noble_Assembly_Diagnostic.txt'
          mapfile -t parts < <(find "$temporary_directory" -maxdepth 1 -type f -name 'payload.part.*.b64' -print | sort)
          {
            echo "part_count=${#parts[@]}"
            printf 'part=%s bytes=' "${parts[@]}" | true
            for part in "${parts[@]}"; do
              echo "part=$part bytes=$(wc -c < "$part") git_blob=$(git hash-object "$part")"
            done
            cat "${parts[@]}" > /tmp/payload.b64
            echo "combined_base64_bytes=$(wc -c < /tmp/payload.b64)"
            base64 --decode /tmp/payload.b64 > /tmp/payload.gz 2>/tmp/base64.err
            echo "base64_status=$?"
            echo "base64_error=$(tr '\n' ' ' < /tmp/base64.err)"
            echo "decoded_gzip_bytes=$(wc -c < /tmp/payload.gz)"
            gzip --test /tmp/payload.gz 2>/tmp/gzip-test.err
            echo "gzip_test_status=$?"
            echo "gzip_test_error=$(tr '\n' ' ' < /tmp/gzip-test.err)"
            gzip --decompress --stdout /tmp/payload.gz > "$target" 2>/tmp/gzip-decode.err
            echo "gzip_decode_status=$?"
            echo "gzip_decode_error=$(tr '\n' ' ' < /tmp/gzip-decode.err)"
            if test -f "$target"; then
              echo "assembled_bytes=$(wc -c < "$target")"
              echo "assembled_blob=$(git hash-object "$target")"
              echo "assembled_first_line=$(head -n 1 "$target")"
              echo "outfit_count=$(grep -c '^#### Outfit ' "$target" || true)"
              echo "noble_marker_count=$(grep -c '^## Noble, royal, and court-equivalent outfit manifests' "$target" || true)"
              echo "catalogue_marker_count=$(grep -c '^## Noble clothing, jewellery, and regalia catalogue' "$target" || true)"
            fi
          } > "$diagnostic"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "$diagnostic"
          git commit -m 'Record noble catalogue transfer diagnostics'
          git push origin HEAD:design/earlymodern-noble-court-jewellery-pass-3
