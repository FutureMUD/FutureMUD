name: Assemble Early Modern military-uniform catalogue

on:
  push:
    branches:
      - design/earlymodern-military-uniforms-pass-2
    paths:
      - .tmp/earlymodern-uniforms-pass2/READY
  pull_request:
    branches:
      - master
    paths:
      - .tmp/earlymodern-uniforms-pass2/READY

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the working branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: design/earlymodern-military-uniforms-pass-2
          fetch-depth: 0
          show-progress: false

      - name: Assemble and verify the catalogue
        shell: bash
        run: |
          set -euo pipefail
          temporary_directory='.tmp/earlymodern-uniforms-pass2'
          target='Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md'
          mapfile -t parts < <(find "$temporary_directory" -maxdepth 1 -type f -name 'catalogue.part.*.b64' -print | sort)
          test "${#parts[@]}" -eq 12
          cat "${parts[@]}" | base64 --decode | gzip --decompress > "$target"
          test "$(git hash-object "$target")" = '940af2af6492bcb9f9a78a36cdd1602d8f3159d8'
          rm -rf "$temporary_directory"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- "$target" "$temporary_directory"
          git commit -m 'Add Early Modern military uniform catalogue pass'
          git push origin HEAD:design/earlymodern-military-uniforms-pass-2
