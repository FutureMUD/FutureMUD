name: Deploy FutureMUD website

on:
  push:
    branches: [ master ]
    paths:
      - 'FutureMUD.Web/**'
      - 'FutureMUDLibrary/Documentation/**'
      - '.github/workflows/deploy-website.yml'

permissions:
  contents: read

concurrency:
  group: futuremud-web-production
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore FutureMUD.Web.Tests/FutureMUD.Web.Tests.csproj -m:1 -p:RestoreBuildInParallel=false -p:NuGetAudit=false
      - run: dotnet test FutureMUD.Web.Tests/FutureMUD.Web.Tests.csproj -c Release --no-restore -m:1
      - run: dotnet publish FutureMUD.Web/FutureMUD.Web.csproj -c Release -r linux-x64 --self-contained false -p:NuGetAudit=false -o publish
      - name: Package deployment
        env:
          DEPLOY_REVISION: ${{ github.sha }}
        run: |
          if [[ ! "$DEPLOY_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'The deployment revision must be a 40-character lowercase hexadecimal commit SHA.' >&2
            exit 1
          fi
          tar -C publish -czf "futuremud-web-${DEPLOY_REVISION}.tar.gz" .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: futuremud-web-deployment
          path: futuremud-web-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: {}
    environment: production
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: futuremud-web-deployment
          path: deployment
      - name: Configure restricted SSH key
        env:
          DEPLOY_KEY: ${{ secrets.FUTUREMUD_WEB_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.FUTUREMUD_WEB_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Transfer and atomically activate
        env:
          DEPLOY_HOST: ${{ secrets.FUTUREMUD_WEB_DEPLOY_HOST }}
          DEPLOY_REVISION: ${{ github.sha }}
          DEPLOY_USER: ${{ secrets.FUTUREMUD_WEB_DEPLOY_USER }}
        run: |
          if [[ ! "$DEPLOY_REVISION" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'The deployment revision must be a 40-character lowercase hexadecimal commit SHA.' >&2
            exit 1
          fi
          scp -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "deployment/futuremud-web-${DEPLOY_REVISION}.tar.gz" \
            "$DEPLOY_USER@$DEPLOY_HOST:incoming/"
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "deploy-futuremud-web '$DEPLOY_REVISION'"
      - name: Verify production
        run: curl --fail --retry 12 --retry-delay 5 --connect-timeout 10 --max-time 30 https://futuremud.com/health/ready
