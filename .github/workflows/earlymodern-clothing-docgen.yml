name: Generate Early Modern clothing catalogue

on:
  push:
    branches:
      - docs/earlymodern-clothing-first-pass-20260719
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out catalogue payload
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: docs/earlymodern-clothing-first-pass-20260719
          fetch-depth: 1
          show-progress: false
          sparse-checkout: |
            /Design Documents/Seeding/.earlymodern-clothing-payload/
            /Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md
          sparse-checkout-cone-mode: false

      - name: Reconstruct and validate design documents
        shell: python
        run: |
          import base64
          import gzip
          import hashlib
          import shutil
          from pathlib import Path

          payload = Path('Design Documents/Seeding/.earlymodern-clothing-payload')
          expected_parts = {
              'catalogue.part00': (10000, 'e950449b1f32458e94d6f43a83076f6113e4ef700867b2723cf6aca5a8a2bb99'),
              'catalogue.part01': (10000, '44badd27ace767a969d5d3fdfaf81b509e337395dd5137bbc0c49e67e67d033e'),
              'catalogue.part02': (10000, 'ba1692cffd2b35c924910da7a0cd22e3609854ad92ca3fb5a239496dc37f9994'),
              'catalogue.part03': (10000, '1f65a88cf51221694cb2bc65a99ecaf9e27b17f1b78c1766cf58afdae71b119c'),
              'catalogue.part04': (9852, '0b97fcd34416209317fa425e7a53df0bb6fa065fce422dbd3d4ca0de023d31d0'),
              'dependencies.part00': (2648, 'e077ef1c38aae27baaabfa5a21801b399c03a2d4eb1a8967f0a7ffcea52641d1'),
          }
          part_failures = []
          for name, (expected_length, expected_sha) in expected_parts.items():
              path = payload / name
              text = path.read_text(encoding='ascii')
              actual_sha = hashlib.sha256(text.encode('ascii')).hexdigest()
              print(f'{name}: length={len(text)} sha256={actual_sha}')
              if len(text) != expected_length or actual_sha != expected_sha:
                  part_failures.append(name)
          if part_failures:
              raise SystemExit('Payload part validation failed: ' + ', '.join(part_failures))

          documents = [
              (
                  Path('Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md'),
                  sorted(payload.glob('catalogue.part*')),
                  '90f09cc78a373e29a57efa11645b6d7fdcf27728976010dc260c811092cce97f',
              ),
              (
                  Path('Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Dependency_Register.md'),
                  sorted(payload.glob('dependencies.part*')),
                  '7ac43ded7649b6308c19a3f63f17510e7f91f1a5cf5488979a5be831dd1e0e45',
              ),
          ]

          for destination, parts, expected_sha256 in documents:
              encoded = ''.join(part.read_text(encoding='ascii') for part in parts)
              content = gzip.decompress(base64.b64decode(encoded))
              actual_sha256 = hashlib.sha256(content).hexdigest()
              print(f'{destination}: sha256={actual_sha256}')
              if actual_sha256 != expected_sha256:
                  raise SystemExit(
                      f'Checksum mismatch for {destination}: '
                      f'expected {expected_sha256}, got {actual_sha256}'
                  )
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(content)

          target = Path('Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md').read_text(encoding='utf-8')
          dependencies = Path('Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Dependency_Register.md').read_text(encoding='utf-8')
          counts = {
              'culture sections': target.count('## Culture '),
              'outfit manifests': target.count('### Outfit '),
              'catalogue rows': target.count('| `earlymodern_'),
          }
          print('Validation counts:', counts)
          checks = {
              'culture sections': counts['culture sections'] == 35,
              'outfit manifests': counts['outfit manifests'] == 350,
              'catalogue rows': counts['catalogue rows'] == 417,
              'global maritime excluded': '## Culture Global maritime' not in target,
              'dependency register populated': 'No blocking new dependencies' in dependencies,
          }
          failures = [name for name, passed in checks.items() if not passed]
          if failures:
              raise SystemExit('Catalogue validation failed: ' + ', '.join(failures))

          shutil.rmtree(payload)

      - name: Commit generated catalogue
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- "Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md" "Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Dependency_Register.md" "Design Documents/Seeding/.earlymodern-clothing-payload"
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Expand Early Modern civilian clothing catalogue"
          git push origin HEAD:docs/earlymodern-clothing-first-pass-20260719
