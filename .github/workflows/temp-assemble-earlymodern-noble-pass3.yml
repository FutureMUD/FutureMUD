name: Temporary Early Modern noble catalogue assembler

on:
  push:
    branches:
      - master
    paths:
      - .github/earlymodern-noble-pass3-trigger
  pull_request:
    branches:
      - master
    paths:
      - .tmp/earlymodern-noble-pass3-final/READY

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the catalogue branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: design/earlymodern-noble-court-jewellery-pass-3-final
          fetch-depth: 0
          show-progress: false

      - name: Verify, assemble, and validate the catalogue
        shell: bash
        run: |
          set -euo pipefail
          temporary_directory='.tmp/earlymodern-noble-pass3-final'
          target='Design Documents/Seeding/FutureMUD_EarlyModern_Clothing_Accessories_Design_Reference.md'
          branch_workflow='.github/workflows/assemble-earlymodern-noble-pass3-final.yml'
          diagnostic="$temporary_directory/CHUNK_DIAGNOSTIC.txt"
          mapfile -t parts < <(find "$temporary_directory" -maxdepth 1 -type f -name 'final.part.*.b64' -print | sort)
          expected=(
            8681dc5805a67c99a98ee878150febc85f3bae81
            2d699a6c02f586656b9c980d1ad0b60d4389851a
            c63d3d0a467da2a223734caaed930356c81fd02f
            9cdae0cd4cf54e2d520864394bb6f0bdc8eb362a
            e194db0f3a69089c684a4173edcf6c664a071129
            647a3abe6b5846c7cec833b659e9cc7f79d23c58
            5176bdbacf4a6f7582fe2b86b0134ffbf10c326f
            dd1b1f6f185ae1498a72876073c867d47b3f418c
            9d93e6af41c676131e452e4a65426936c6ecba13
            0601b12a7d15760a0db781904cd3ca7b8d43e472
            879c35b967d2dc3f16ac52fd7df74024549d52c1
            41a1e471879db2c04d032fd37e8282056c76a5da
            2dbd4ecc1230405fdf19579e25ee132339b9f093
            a462c6c9216e9b5345d771498d721231353b26fe
            ac1c48b5c3a50eeb4288c6fb1418d51f62512eb4
            81da447d947e9bb5dd9dd60610fcb7847d4229b7
            dafd0fc369bea6f61334a4acc370acf40d36237e
            169aed732e218fcca9988d73ff624fee4447b54e
            9344551bbddfe0978381cb9e140b52ec330a2d18
            eb6b4f90cebc865a0c1034ebd504f6bbb605ab2a
            5d739fc4fe00ae1dd8acebed898c7dc242aab2de
            2315b66195c63e37c3a9fb609cf264f9d1d2b908
            f6a0bd9d6771f270d003d326ba5429f5ae3fea50
            33562d18502f51bd9f1cd4d2b808a1822659f489
            8fa6390ec8b943d554e530088ae54e7307a3b85f
            8af18e3e93f57efadd5e9103f20171df1deed389
            8eb65dba363a7ab259694197e5986eab6df4c6fa
            55720dd1caff50918f56683386029eb18d2dd90c
            f16c1f96427bdfae8fca9b402d63c76c372c9f13
            1a3ef028f4745ba4026401142d51dbcbf6a9f8b3
            5f7fdc5bb7f8d8c1e45a267e8b4a993cc279b0fb
            4b96b32a1ec9eadd89fa113675469a362c73d8fa
          )
          : > "$diagnostic"
          if [[ "${#parts[@]}" -ne 32 ]]; then
            printf 'part_count expected=32 actual=%s\n' "${#parts[@]}" >> "$diagnostic"
          fi
          for i in "${!parts[@]}"; do
            actual="$(git hash-object "${parts[$i]}")"
            if [[ "$actual" != "${expected[$i]}" ]]; then
              printf 'MISMATCH %02d expected=%s actual=%s path=%s\n' "$i" "${expected[$i]}" "$actual" "${parts[$i]}" >> "$diagnostic"
            fi
          done
          if [[ -s "$diagnostic" ]]; then
            cat "$diagnostic"
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- "$diagnostic"
            git commit -m 'Record noble catalogue payload mismatches'
            git push origin HEAD:design/earlymodern-noble-court-jewellery-pass-3-final
            exit 0
          fi
          cat "${parts[@]}" | base64 --decode | gzip --decompress > "$target"
          test "$(git hash-object "$target")" = 'e0727744d6348d815426d530d6f3eb2afa3d4783'
          python - "$target" <<'PY'
          from pathlib import Path
          import re
          import sys

          text = Path(sys.argv[1]).read_text(encoding='utf-8')
          assert text.count('#### Outfit ') == 350
          assert text.count('#### Military outfit ') == 220
          assert text.count('#### Noble outfit ') == 216
          noble_start = text.index('## Noble, royal, and court-equivalent outfit manifests')
          catalogue_start = text.index('## Noble clothing, jewellery, and regalia catalogue')
          noble = text[noble_start:catalogue_start]
          catalogue = text[catalogue_start:]
          assert len(re.findall(r'^### \d+\. ', noble, re.MULTILINE)) == 36
          assert len(re.findall(r'^\| `[^`]+` \|', catalogue, re.MULTILINE)) == 351
          assert noble.count('male everyday courtly wear') == 36
          assert noble.count('male outdoor or travel attire') == 36
          assert noble.count('male formal or state-occasion dress') == 36
          assert noble.count('female everyday courtly wear') == 36
          assert noble.count('female outdoor or travel attire') == 36
          assert noble.count('female formal or state-occasion dress') == 36
          assert '**786**' in text
          assert '**351** new stable references' in text
          PY
          rm -rf "$temporary_directory"
          rm -f "$branch_workflow"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A -- "$target" "$temporary_directory" "$branch_workflow"
          git commit -m 'Add Early Modern noble and jewellery catalogue pass'
          git push origin HEAD:design/earlymodern-noble-court-jewellery-pass-3-final
