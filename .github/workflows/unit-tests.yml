name: Unit Tests

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default-gate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'
      - name: Run default unit-test gate on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./scripts/test-unit.sh
      - name: Run default unit-test gate on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& .\scripts\test-unit.ps1'
