name: Website Security

on:
  pull_request:
    paths:
      - "FutureMUD.Web/**"
      - "FutureMUD.Web.Tests/**"
      - "FutureMUDLibrary/Documentation/**"
      - ".github/dependabot.yml"
      - ".github/workflows/website-security.yml"
  push:
    branches:
      - master
    paths:
      - "FutureMUD.Web/**"
      - "FutureMUD.Web.Tests/**"
      - "FutureMUDLibrary/Documentation/**"
      - ".github/dependabot.yml"
      - ".github/workflows/website-security.yml"
  schedule:
    - cron: "23 17 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "website-security-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    name: Dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low

  validate:
    name: Restore, audit, build, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.301"

      - name: Restore with NuGet audit enforcement
        shell: bash
        run: |
          dotnet restore FutureMUD.Web.Tests/FutureMUD.Web.Tests.csproj \
            -m:1 \
            -p:RestoreBuildInParallel=false \
            -p:NuGetAudit=true \
            -p:NuGetAuditMode=all \
            -p:NuGetAuditLevel=low \
            -p:WarningsAsErrors=NU1900%3BNU1901%3BNU1902%3BNU1903%3BNU1904%3BNU1905

      - name: Report vulnerable packages
        shell: bash
        run: |
          dotnet list FutureMUD.Web/FutureMUD.Web.csproj package \
            --vulnerable \
            --include-transitive \
            --no-restore
          dotnet list FutureMUD.Web.Tests/FutureMUD.Web.Tests.csproj package \
            --vulnerable \
            --include-transitive \
            --no-restore

      - name: Enforce website dependency boundary
        shell: bash
        run: |
          set -euo pipefail
          dependency_graph="$(dotnet list FutureMUD.Web/FutureMUD.Web.csproj package --include-transitive --no-restore)"
          printf '%s\n' "$dependency_graph"
          if grep -Eiq 'BouncyCastle|EntityFrameworkCore|ExpressionEngine|FutureMUDLibrary|MudsharpDatabaseLibrary|MySql|Pomelo' <<< "$dependency_graph"; then
            echo "::error::The website dependency graph contains an engine, database, or cryptography package."
            exit 1
          fi

      - name: Build website
        run: dotnet build FutureMUD.Web/FutureMUD.Web.csproj -c Release --no-restore -m:1

      - name: Test website
        run: dotnet test FutureMUD.Web.Tests/FutureMUD.Web.Tests.csproj -c Release --no-restore -m:1

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            FutureMUD.Web
            FutureMUDLibrary/Documentation

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: csharp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:csharp"
