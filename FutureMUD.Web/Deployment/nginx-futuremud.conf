limit_req_zone $binary_remote_addr zone=futuremud_publish:10m rate=30r/m;

server {
	listen 80;
	listen [::]:80;
	server_name futuremud.com www.futuremud.com;
	return 301 https://futuremud.com$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name www.futuremud.com;
	ssl_certificate /etc/letsencrypt/live/futuremud.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/futuremud.com/privkey.pem;
	return 301 https://futuremud.com$request_uri;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name futuremud.com;

	ssl_certificate /etc/letsencrypt/live/futuremud.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/futuremud.com/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	client_max_body_size 34m;
	gzip on;
	gzip_types text/plain text/css application/javascript application/json application/xml application/rss+xml;

	location /api/publishing/ {
		limit_req zone=futuremud_publish burst=20 nodelay;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_read_timeout 15m;
		proxy_pass http://127.0.0.1:5070;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto https;
		add_header Cache-Control "no-store" always;
	}

	location ~ ^/health/ {
		proxy_pass http://127.0.0.1:5070;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Proto https;
		add_header Cache-Control "no-store" always;
	}

	location / {
		proxy_pass http://127.0.0.1:5070;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto https;
	}
}
