include /etc/nginx/snippets/cloudflare-real-ip.conf;

server_tokens off;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:FutureMUDTLS:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;
ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
ssl_verify_client on;

# $binary_remote_addr is the visitor address after the trusted Cloudflare
# real-IP configuration above has run, not the Cloudflare point of presence.
limit_req_zone $binary_remote_addr zone=futuremud_publish:10m rate=30r/m;

server {
	listen 80 default_server;
	listen [::]:80 default_server;
	server_name _;
	return 444;
}

server {
	listen 80;
	listen [::]:80;
	server_name futuremud.com www.futuremud.com;
	return 301 https://futuremud.com$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name www.futuremud.com;
	ssl_certificate /etc/ssl/certs/futuremud-origin.pem;
	ssl_certificate_key /etc/ssl/private/futuremud-origin.key;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	return 301 https://futuremud.com$request_uri;
}

server {
	listen 443 ssl default_server;
	listen [::]:443 ssl default_server;
	http2 on;
	server_name _;
	ssl_certificate /etc/ssl/certs/futuremud-origin.pem;
	ssl_certificate_key /etc/ssl/private/futuremud-origin.key;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	return 444;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name futuremud.com;

	ssl_certificate /etc/ssl/certs/futuremud-origin.pem;
	ssl_certificate_key /etc/ssl/private/futuremud-origin.key;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	client_max_body_size 1m;
	client_header_timeout 10s;
	client_body_timeout 15s;
	keepalive_timeout 30s;
	keepalive_requests 1000;
	send_timeout 30s;
	gzip on;
	gzip_types text/plain text/css application/javascript application/json application/xml application/rss+xml;

	location ^~ /api/publishing/ {
		client_max_body_size 34m;
		client_body_timeout 15m;
		limit_req zone=futuremud_publish burst=20 nodelay;
		limit_req_status 429;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_connect_timeout 3s;
		proxy_send_timeout 15m;
		proxy_read_timeout 15m;
		proxy_pass http://127.0.0.1:5070;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto https;
		proxy_hide_header Strict-Transport-Security;
		proxy_hide_header Cache-Control;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		add_header Cache-Control "no-store" always;
	}

	location ^~ /health/ {
		proxy_connect_timeout 3s;
		proxy_send_timeout 10s;
		proxy_read_timeout 10s;
		proxy_pass http://127.0.0.1:5070;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto https;
		proxy_hide_header Strict-Transport-Security;
		proxy_hide_header Cache-Control;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
		add_header Cache-Control "no-store" always;
	}

	location / {
		proxy_connect_timeout 3s;
		proxy_send_timeout 30s;
		proxy_read_timeout 60s;
		proxy_pass http://127.0.0.1:5070;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $remote_addr;
		proxy_set_header X-Forwarded-Proto https;
		proxy_hide_header Strict-Transport-Security;
	}
}
