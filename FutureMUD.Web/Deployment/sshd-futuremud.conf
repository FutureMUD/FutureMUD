PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitRootLogin no
PubkeyAuthentication yes
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2
X11Forwarding no
AllowAgentForwarding no

Match User futuremud-deploy
	AuthenticationMethods publickey
	AuthorizedKeysFile /etc/ssh/authorized_keys/futuremud-deploy
	PasswordAuthentication no
	KbdInteractiveAuthentication no
	ChallengeResponseAuthentication no
	PermitTTY no
	AllowTcpForwarding no
	AllowAgentForwarding no
	X11Forwarding no
	PermitTunnel no
	PermitUserRC no
	ForceCommand /usr/local/libexec/futuremud-deploy-gate
